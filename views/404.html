<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — ElTemAIch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Federant&family=Gemunu+Libre:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --red: #FF0509; --cyan: #5DFFF1;
      --text: #f0f0f0; --text-muted: #666;
      --font-d: 'Federant', serif; --font-b: 'Gemunu Libre', sans-serif;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-b);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(93,255,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(93,255,241,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .container {
      text-align: center; padding: 40px 24px;
      animation: fadeUp 0.6s ease both;
      position: relative; z-index: 1;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .code {
      font-family: var(--font-d);
      font-size: clamp(80px, 20vw, 160px);
      line-height: 1;
      background: linear-gradient(135deg, var(--red) 0%, var(--cyan) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .title {
      font-family: var(--font-d); font-size: 22px;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--text); margin-bottom: 10px;
    }
    .sub {
      font-size: 14px; color: var(--text-muted);
      max-width: 360px; margin: 0 auto 32px; line-height: 1.6;
    }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--red); color: #fff;
      font-family: var(--font-b); font-size: 13px; font-weight: 800;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 12px 28px; text-decoration: none;
      border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-home:hover { background: #c40005; transform: translateY(-1px); }
    .fist {
      margin-bottom: 24px;
      filter: drop-shadow(0 0 20px rgba(93,255,241,0.3));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="fist">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3"    y="2"   width="3.5" height="8"   rx="1.75" fill="white"/>
        <rect x="7.5"  y="1"   width="3.5" height="9"   rx="1.75" fill="white"/>
        <rect x="12"   y="1.5" width="3.5" height="8.5" rx="1.75" fill="white"/>
        <rect x="16.5" y="3"   width="3.5" height="7"   rx="1.75" fill="white"/>
        <rect x="2"    y="8"   width="19"  height="7.5" rx="2"    fill="white"/>
        <rect x="0"    y="10"  width="5"   height="4"   rx="2"    fill="white"/>
        <rect x="4.5"  y="14"  width="14"  height="5.5" rx="1.5"  fill="white"/>
        <path d="M4 19.5 C2 19.5 1 20.5 1 21.5 C1 22.5 2 23.5 4 23.5" stroke="#5DFFF1" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M20 19.5 C22 19.5 23 20.5 23 21.5 C23 22.5 22 23.5 20 23.5" stroke="#5DFFF1" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <line x1="5"  y1="15" x2="2"  y2="11" stroke="#5DFFF1" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="6.5" y1="14.5" x2="4.5" y2="11.5" stroke="#5DFFF1" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
        <line x1="19"  y1="15" x2="22"  y2="11" stroke="#5DFFF1" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="17.5" y1="14.5" x2="19.5" y2="11.5" stroke="#5DFFF1" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
      </svg>
    </div>
    <div class="code">404</div>
    <div class="title">Página no encontrada</div>
    <p class="sub">Esta página no existe, mi compa. Pero el conocimiento sí está — vuelve al chat.</p>
    <a href="/" class="btn-home">← Volver al inicio</a>
  </div>
</body>
</html>
