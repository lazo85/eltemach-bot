<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi perfil — TemaichBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/temaich-bot.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:   #d4a017;
      --gold2:  #f5c842;
      --red:    #cc1a1a;
      --red2:   #ff3333;
      --dark:   #080808;
      --dark2:  #101010;
      --dark3:  #161616;
      --card:   rgba(255,255,255,0.04);
      --border: rgba(212,160,23,0.2);
      --glow:   0 0 22px rgba(212,160,23,0.45);
      --text:   #e8e0d0;
      --muted:  #7a7060;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1,h2,h3,h4 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
    a { text-decoration: none; }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 3rem;
      background: rgba(8,8,8,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .nav-logo-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--red));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; box-shadow: var(--glow);
    }
    .nav-logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem; letter-spacing: 3px; color: #fff;
    }
    .nav-logo-text em { color: var(--gold); font-style: normal; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; align-items: center; }
    .nav-links a {
      color: #888; font-size: 0.85rem; font-weight: 600;
      letter-spacing: 1.5px; transition: color .3s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-links a.danger { color: #666; }
    .nav-links a.danger:hover { color: var(--red2); }
    @media(max-width:640px) { nav { padding: 0.8rem 1.2rem; } }

    /* ── PAGE ── */
    .page {
      padding: 7rem 2rem 4rem;
      max-width: 1080px;
      margin: 0 auto;
    }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 2.5rem; }
    .page-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      background: linear-gradient(90deg, var(--gold2), var(--red2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-header p {
      color: var(--muted); font-size: 0.95rem; letter-spacing: 1px; margin-top: 4px;
    }

    /* ── GRID ── */
    .profile-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    @media(max-width:780px) { .profile-grid { grid-template-columns: 1fr; } }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.8rem;
      position: relative;
      overflow: hidden;
    }
    .card-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem; letter-spacing: 3px;
      color: var(--gold); margin-bottom: 1.4rem;
      text-transform: uppercase;
    }

    /* ── TOKEN DISPLAY ── */
    .token-display {
      text-align: center;
      padding: 2rem 1.5rem;
    }
    .token-display::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold2), var(--red2));
    }
    .token-big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem; line-height: 1;
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(212,160,23,.5));
      min-height: 80px; display: inline-block;
    }
    .token-big-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.62rem; letter-spacing: 3px;
      color: var(--muted); margin-top: 6px;
    }
    .token-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(212,160,23,.08);
      border: 1px solid rgba(212,160,23,.2);
      border-radius: 100px; padding: .3rem .9rem;
      font-size: .78rem; color: var(--gold);
      margin-top: 1rem;
    }
    .token-badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #00e676; box-shadow: 0 0 6px #00e676;
      animation: blink 1.6s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── PACKAGES ── */
    .packages-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 1rem;
    }
    .pkg-card {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1rem;
      text-align: center;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      transition: all .3s;
    }
    .pkg-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: var(--glow); }
    .pkg-card.popular { border-color: var(--gold); box-shadow: var(--glow); }
    .pkg-card.popular::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold2), var(--red));
    }
    .pkg-popular-tag {
      position: absolute; top: 6px; right: 8px;
      background: linear-gradient(135deg, var(--gold2), var(--red));
      color: #000; font-size: 7px; font-weight: 800;
      letter-spacing: 1px; padding: 2px 7px; border-radius: 100px;
    }
    .pkg-tokens {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem; line-height: 1;
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .pkg-label { font-family: 'Orbitron'; font-size: .6rem; letter-spacing: 2px; color: var(--muted); }
    .pkg-divider { width: 28px; height: 1px; background: var(--border); margin: 4px 0; }
    .pkg-price { font-family: 'Bebas Neue'; font-size: 1.4rem; color: var(--text); }
    .pkg-price-sub { font-size: .72rem; color: var(--muted); margin-bottom: .7rem; }

    /* ── BUTTONS ── */
    .btn-gold {
      padding: .55rem 1.4rem; border-radius: 8px;
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      color: #000; font-family: 'Bebas Neue'; font-size: 0.95rem; letter-spacing: 2px;
      border: none; cursor: pointer;
      box-shadow: 0 0 14px rgba(212,160,23,.4);
      transition: all .3s; width: 100%;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: var(--glow); }
    .btn-gold:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── ALERTS ── */
    .alert {
      border-radius: 10px; padding: .7rem 1rem;
      font-size: .85rem; margin-bottom: 1rem;
      display: none;
    }
    .alert.show { display: block; }
    .alert-success { background: rgba(0,230,118,.08); border: 1px solid rgba(0,230,118,.25); color: #00e676; }
    .alert-error   { background: rgba(204,26,26,.08);  border: 1px solid rgba(204,26,26,.3);  color: var(--red2); }

    /* ── TABLE ── */
    .data-table {
      width: 100%; border-collapse: collapse;
      font-size: .88rem;
    }
    .data-table th {
      font-family: 'Orbitron'; font-size: .6rem;
      letter-spacing: 2px; color: var(--muted);
      text-align: left; padding: .5rem .75rem .9rem;
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: .75rem;
      border-bottom: 1px solid rgba(212,160,23,.07);
      color: var(--text); vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(212,160,23,.03); }

    .tx-type { font-family: 'Orbitron'; font-size: .6rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
    .tx-bonus    { color: var(--gold); }
    .tx-purchase { color: #00e676; }
    .tx-grant    { color: #88aaff; }
    .tx-usage    { color: var(--muted); }
    .tx-positive { color: var(--gold2); font-weight: 700; font-family: 'Bebas Neue'; font-size: 1.1rem; }
    .tx-negative { color: var(--muted); font-family: 'Bebas Neue'; font-size: 1.1rem; }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px; color: transparent !important;
    }
    .skel-row td { height: 44px; }
    @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

    /* ── FOOTER NOTE ── */
    .note {
      font-size: .78rem; color: var(--muted);
      line-height: 1.6; margin-top: .9rem;
      padding-top: .9rem; border-top: 1px solid var(--border);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(var(--gold), var(--red)); border-radius: 3px; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <a class="nav-logo" href="/">
    <div class="nav-logo-icon">⚡</div>
    <span class="nav-logo-text">TEMAICH<em>BOT</em></span>
  </a>
  <ul class="nav-links">
    <li><a href="/">Chat</a></li>
    <li><a href="/profile" class="active">Perfil</a></li>
    <li><a href="#" class="danger" id="logout-btn">Salir</a></li>
  </ul>
</nav>

<!-- PAGE -->
<div class="page">

  <!-- Header -->
  <div class="page-header">
    <h1 id="welcome-title">Mi perfil</h1>
    <p id="user-email">—</p>
  </div>

  <div class="profile-grid">

    <!-- Columna izquierda -->
    <div style="display:flex;flex-direction:column;gap:1.2rem;">

      <!-- Tokens -->
      <div class="card token-display">
        <div class="card-title">Tokens disponibles</div>
        <div class="token-big skeleton" id="token-count" style="min-width:80px;min-height:80px;">—</div>
        <div class="token-big-label">TOKENS</div>
        <div class="token-badge">
          <span class="token-badge-dot"></span>
          1 uso = 1 token
        </div>
      </div>

      <!-- Comprar -->
      <div class="card">
        <div class="card-title">Comprar tokens</div>
        <div class="alert alert-success" id="buy-success"></div>
        <div class="alert alert-error"   id="buy-error"></div>
        <div class="packages-grid" id="packages-grid"></div>
        <p class="note">Al enviar la solicitud, el equipo confirmará tu pago y agregará los tokens a tu cuenta.</p>
      </div>

    </div>

    <!-- Columna derecha: historial -->
    <div class="card">
      <div class="card-title">Historial de transacciones</div>
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Tokens</th>
              <th>Descripción</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody id="tx-list">
            <tr class="skeleton skel-row"><td colspan="4">&nbsp;</td></tr>
            <tr class="skeleton skel-row"><td colspan="4">&nbsp;</td></tr>
            <tr class="skeleton skel-row"><td colspan="4">&nbsp;</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
  const token = localStorage.getItem('temach_token');
  if (!token) window.location.href = '/login';

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  async function loadProfile() {
    const res = await fetch('/api/auth/me', { headers: authHeaders() });
    if (!res.ok) { localStorage.clear(); window.location.href = '/login'; return; }
    const data = await res.json();

    document.getElementById('welcome-title').textContent = `Hola, ${data.username}`;
    document.getElementById('user-email').textContent = data.email;

    const tc = document.getElementById('token-count');
    tc.classList.remove('skeleton');
    tc.style.minWidth = ''; tc.style.minHeight = '';
    tc.textContent = data.is_admin ? '∞' : data.tokens;

    const txList = document.getElementById('tx-list');
    if (!data.transactions.length) {
      txList.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px;">Sin transacciones aún</td></tr>';
    } else {
      txList.innerHTML = data.transactions.map(tx => {
        const typeClass = {
          register_bonus: 'tx-bonus',
          purchase:       'tx-purchase',
          admin_grant:    'tx-grant',
          chat_usage:     'tx-usage'
        }[tx.type] || '';
        const sign = tx.amount > 0 ? '+' : '';
        const amtClass = tx.amount > 0 ? 'tx-positive' : 'tx-negative';
        const date = new Date(tx.created_at).toLocaleDateString('es', { day:'2-digit', month:'short', year:'numeric' });
        return `<tr>
          <td><span class="tx-type ${typeClass}">${tx.type.replace(/_/g,' ')}</span></td>
          <td class="${amtClass}">${sign}${tx.amount}</td>
          <td style="color:var(--muted);font-size:.85rem;">${tx.description || '—'}</td>
          <td style="color:var(--muted);font-size:.82rem;white-space:nowrap;">${date}</td>
        </tr>`;
      }).join('');
    }
  }

  async function loadPackages() {
    const res = await fetch('/api/tokens/packages');
    const pkgs = await res.json();
    document.getElementById('packages-grid').innerHTML = pkgs.map(p => `
      <div class="pkg-card ${p.popular ? 'popular' : ''}">
        ${p.popular ? '<div class="pkg-popular-tag">Popular</div>' : ''}
        <div class="pkg-tokens">${p.tokens}</div>
        <div class="pkg-label">tokens</div>
        <div class="pkg-divider"></div>
        <div class="pkg-price">$${p.price_usd} USD</div>
        <div class="pkg-price-sub">${p.tokens / p.price_usd} tokens por dólar</div>
        <button class="btn-gold" onclick="buyPackage('${p.id}', this)">Comprar</button>
      </div>
    `).join('');
  }

  async function buyPackage(packageId, btn) {
    btn.disabled = true; btn.textContent = 'Procesando...';
    const errorEl = document.getElementById('buy-error');
    errorEl.className = 'alert alert-error';
    try {
      const res = await fetch('/api/payments/create', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ packageId })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      window.location.href = data.sandboxInitPoint || data.initPoint;
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.className = 'alert alert-error show';
      btn.disabled = false; btn.textContent = 'Comprar';
    }
  }

  document.getElementById('logout-btn').addEventListener('click', (e) => {
    e.preventDefault();
    localStorage.clear();
    window.location.href = '/login';
  });

  loadProfile();
  loadPackages();
</script>
</body>
</html>
