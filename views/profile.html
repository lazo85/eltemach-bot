<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi perfil — ElTemAIch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="/css/auth.css"/>
  <style>
    .profile-grid { display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
    .token-display { text-align: center; padding: 28px 20px; }
    .token-big { font-family: var(--font-d); font-size: 64px; color: var(--cyan); line-height: 1; }
    .token-big-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-top: 6px; }
    .tx-type { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .tx-bonus   { color: var(--cyan); }
    .tx-purchase{ color: #44dd88; }
    .tx-grant   { color: #88aaff; }
    .tx-usage   { color: var(--text-muted); }

    /* Package cards mejoradas */
    .packages-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .pkg-card {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 20px 16px 18px;
      text-align: center;
      position: relative;
      transition: border-color 0.2s, transform 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .pkg-card:hover { border-color: var(--cyan-dark); transform: translateY(-2px); }
    .pkg-card.popular { border-color: var(--cyan-dark); }
    .pkg-card.popular::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--cyan));
    }
    .pkg-popular-tag {
      position: absolute; top: -1px; right: 14px;
      background: var(--cyan); color: #000;
      font-size: 8px; font-weight: 800;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 3px 8px;
    }
    .pkg-tokens { font-family: var(--font-d); font-size: 44px; color: var(--cyan); line-height: 1; }
    .pkg-label  { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }
    .pkg-divider { width: 32px; height: 1px; background: var(--border); margin: 4px 0; }
    .pkg-price  { font-family: var(--font-d); font-size: 22px; color: var(--text); }
    .pkg-price-sub { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .pkg-card .btn { width: 100%; margin-top: auto; }

    @media (max-width: 700px) { .profile-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="2" width="3.5" height="8" rx="1.75" fill="white"/>
          <rect x="7.5" y="1" width="3.5" height="9" rx="1.75" fill="white"/>
          <rect x="12" y="1.5" width="3.5" height="8.5" rx="1.75" fill="white"/>
          <rect x="16.5" y="3" width="3.5" height="7" rx="1.75" fill="white"/>
          <rect x="2" y="8" width="19" height="7.5" rx="2" fill="white"/>
          <rect x="0" y="10" width="5" height="4" rx="2" fill="white"/>
          <rect x="4.5" y="14" width="14" height="5.5" rx="1.5" fill="white"/>
          <path d="M4 19.5 C2 19.5 1 20.5 1 21.5 C1 22.5 2 23.5 4 23.5" stroke="#5DFFF1" stroke-width="1.4" fill="none" stroke-linecap="round"/>
          <path d="M20 19.5 C22 19.5 23 20.5 23 21.5 C23 22.5 22 23.5 20 23.5" stroke="#5DFFF1" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text"><span class="logo-channel">El<span class="logo-ai">TEM</span>AI<span class="logo-ai">ch</span></span></div>
    </a>
    <nav class="header-nav">
      <a href="/" class="nav-link">Chat</a>
      <a href="/profile" class="nav-link active">Perfil</a>
      <a href="#" class="nav-link danger" id="logout-btn">Salir</a>
    </nav>
  </div>
</header>

<div class="page">
  <div style="max-width:1000px;margin:0 auto;padding:0 20px;">
    <div style="margin-bottom:28px;">
      <div class="page-title" id="welcome-title">Mi perfil</div>
      <div class="page-sub" id="user-email">—</div>
    </div>

    <div class="profile-grid">
      <!-- Left: tokens + info -->
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div class="card token-display">
          <div class="token-big" id="token-count">—</div>
          <div class="token-big-label">Tokens disponibles</div>
        </div>

        <div class="card">
          <div class="section-title">Comprar tokens</div>
          <div class="alert alert-success" id="buy-success" style="margin-bottom:14px;"></div>
          <div class="alert alert-error" id="buy-error" style="margin-bottom:14px;"></div>
          <div class="packages-grid" id="packages-grid">
            <!-- dinámico -->
          </div>
          <p style="font-size:11px;color:var(--text-dim);margin-top:14px;line-height:1.5;">
            Al enviar la solicitud, el equipo confirmará tu pago y agregará los tokens a tu cuenta.
          </p>
        </div>

      </div>

      <!-- Right: historial -->
      <div class="card">
        <div class="section-title">Historial de transacciones</div>
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Tokens</th>
                <th>Descripción</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody id="tx-list">
              <tr><td colspan="4" style="text-align:center;color:var(--text-dim);padding:20px;">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('temach_token');
  if (!token) window.location.href = '/login';

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  async function loadProfile() {
    const res = await fetch('/api/auth/me', { headers: authHeaders() });
    if (!res.ok) { localStorage.clear(); window.location.href = '/login'; return; }
    const data = await res.json();

    document.getElementById('welcome-title').textContent = `Hola, ${data.username}`;
    document.getElementById('user-email').textContent = data.email;
    document.getElementById('token-count').textContent = data.is_admin ? '∞' : data.tokens;

    const txList = document.getElementById('tx-list');
    if (!data.transactions.length) {
      txList.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-dim);padding:20px;">Sin transacciones aún</td></tr>';
    } else {
      txList.innerHTML = data.transactions.map(tx => {
        const typeClass = { register_bonus: 'tx-bonus', purchase: 'tx-purchase', admin_grant: 'tx-grant', chat_usage: 'tx-usage' }[tx.type] || '';
        const sign = tx.amount > 0 ? '+' : '';
        const date = new Date(tx.created_at).toLocaleDateString('es', { day:'2-digit', month:'short', year:'numeric' });
        return `<tr>
          <td><span class="tx-type ${typeClass}">${tx.type.replace('_',' ')}</span></td>
          <td class="${tx.amount > 0 ? 'td-cyan' : ''}" style="font-weight:700;">${sign}${tx.amount}</td>
          <td>${tx.description || '—'}</td>
          <td>${date}</td>
        </tr>`;
      }).join('');
    }
  }

  async function loadPackages() {
    const res = await fetch('/api/tokens/packages');
    const pkgs = await res.json();
    document.getElementById('packages-grid').innerHTML = pkgs.map(p => `
      <div class="pkg-card ${p.popular ? 'popular' : ''}">
        ${p.popular ? '<div class="pkg-popular-tag">Popular</div>' : ''}
        <div class="pkg-tokens">${p.tokens}</div>
        <div class="pkg-label">tokens</div>
        <div class="pkg-divider"></div>
        <div class="pkg-price">$${p.price_usd} USD</div>
        <div class="pkg-price-sub">${p.tokens / p.price_usd} tokens por dólar</div>
        <button class="btn btn-primary btn-sm" onclick="buyPackage('${p.id}', this)">Comprar</button>
      </div>
    `).join('');
  }

  async function buyPackage(packageId, btn) {
    btn.disabled = true; btn.textContent = 'Enviando...';
    const successEl = document.getElementById('buy-success');
    const errorEl = document.getElementById('buy-error');
    successEl.className = 'alert alert-success'; errorEl.className = 'alert alert-error';

    try {
      const res = await fetch('/api/tokens/request', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ packageId })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      successEl.textContent = data.message;
      successEl.className = 'alert alert-success show';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.className = 'alert alert-error show';
    }
    btn.disabled = false; btn.textContent = 'Solicitar';
  }

  document.getElementById('logout-btn').addEventListener('click', (e) => {
    e.preventDefault();
    localStorage.clear();
    window.location.href = '/login';
  });

  loadProfile();
  loadPackages();
</script>
</body>
</html>
