<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElTemAIch — Chatea con el canal</title>
  <meta name="description" content="Chatbot basado en todos los videos del canal ELTEMACH. Pregunta cualquier cosa que ELTEMACH haya enseñado." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .nav-link { color: var(--text-muted); text-decoration: none; font-family: var(--font-body); font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 5px 12px; border: 1px solid transparent; transition: all 0.15s; }
    .nav-link:hover { background: var(--cyan); border-color: var(--cyan); color: #000; }
    .no-tokens-msg { background: rgba(255,5,9,0.08); border: 1px solid rgba(255,5,9,0.4); color: #ff6666; padding: 10px 16px; font-size: 13px; font-weight: 600; margin: 0 28px 12px; display: none; }
    .no-tokens-msg a { color: var(--cyan); text-decoration: none; font-weight: 700; }
    .send-btn { flex-direction: column; gap: 2px; width: 52px; height: 52px; }
    .send-token-cost { font-family: var(--font-body); font-size: 10px; font-weight: 800; letter-spacing: 0.5px; line-height: 1; opacity: 0.85; }
    .send-btn:hover .send-token-cost { opacity: 1; color: #000; }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-icon">
          <!-- Ícono: puño rompe cadenas -->
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Cuatro dedos -->
            <rect x="3"    y="2"   width="3.5" height="8"   rx="1.75" fill="white"/>
            <rect x="7.5"  y="1"   width="3.5" height="9"   rx="1.75" fill="white"/>
            <rect x="12"   y="1.5" width="3.5" height="8.5" rx="1.75" fill="white"/>
            <rect x="16.5" y="3"   width="3.5" height="7"   rx="1.75" fill="white"/>
            <!-- Palma -->
            <rect x="2" y="8" width="19" height="7.5" rx="2" fill="white"/>
            <!-- Pulgar -->
            <rect x="0" y="10" width="5" height="4" rx="2" fill="white"/>
            <!-- Muñeca -->
            <rect x="4.5" y="14" width="14" height="5.5" rx="1.5" fill="white"/>
            <!-- Cadena izquierda (rota) -->
            <path d="M4 19.5 C2 19.5 1 20.5 1 21.5 C1 22.5 2 23.5 4 23.5"
                  stroke="#5DFFF1" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            <!-- Cadena derecha (rota) -->
            <path d="M20 19.5 C22 19.5 23 20.5 23 21.5 C23 22.5 22 23.5 20 23.5"
                  stroke="#5DFFF1" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            <!-- Chispa izquierda -->
            <line x1="5"  y1="15" x2="2"  y2="11" stroke="#5DFFF1" stroke-width="1.1" stroke-linecap="round"/>
            <line x1="6.5" y1="14.5" x2="4.5" y2="11.5" stroke="#5DFFF1" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
            <!-- Chispa derecha -->
            <line x1="19"  y1="15" x2="22"  y2="11" stroke="#5DFFF1" stroke-width="1.1" stroke-linecap="round"/>
            <line x1="17.5" y1="14.5" x2="19.5" y2="11.5" stroke="#5DFFF1" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-channel">El<span class="logo-tem">Tem</span><span class="logo-ai">AI</span><span class="logo-ch">ch</span></span>
        </div>
      </a>
      <nav class="header-nav">
        <div class="token-badge" id="token-badge" style="display:none;">
          ⚡ <span class="t-num" id="token-count">0</span>
        </div>
        <a href="/profile" class="nav-link" id="profile-link" style="display:none;"></a>
        <a href="/login" class="nav-link" id="login-link" style="display:none;">Entrar</a>
        <div class="status-pill" id="status-pill">
          <span class="status-dot"></span>
          <span id="status-text">Cargando...</span>
        </div>
      </nav>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <main class="main-layout">
    <section class="chat-section">
      <div class="chat-container">
        <div class="messages" id="messages">
          <div class="msg-row bot">
            <div class="msg-avatar bot-avatar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="2" width="3" height="7" rx="1.5" fill="white"/>
                <rect x="7" y="1" width="3" height="8" rx="1.5" fill="white"/>
                <rect x="11" y="1.5" width="3" height="7.5" rx="1.5" fill="white"/>
                <rect x="15" y="3" width="3" height="6" rx="1.5" fill="white"/>
                <rect x="2" y="7.5" width="17" height="7" rx="2" fill="white"/>
                <rect x="0" y="9.5" width="4.5" height="3.5" rx="1.75" fill="white"/>
                <rect x="4" y="13" width="13" height="5" rx="1.5" fill="white"/>
                <path d="M3.5 17.5 C1.5 17.5 0.5 18.5 0.5 19.5 C0.5 20.5 1.5 21.5 3.5 21.5" stroke="#5DFFF1" stroke-width="1.3" fill="none" stroke-linecap="round"/>
                <path d="M17.5 17.5 C19.5 17.5 20.5 18.5 20.5 19.5 C20.5 20.5 19.5 21.5 17.5 21.5" stroke="#5DFFF1" stroke-width="1.3" fill="none" stroke-linecap="round"/>
                <line x1="4.5" y1="13.5" x2="2" y2="10" stroke="#5DFFF1" stroke-width="1" stroke-linecap="round"/>
                <line x1="16.5" y1="13.5" x2="19" y2="10" stroke="#5DFFF1" stroke-width="1" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="msg-bubble bot-bubble">
              <strong>Soy ElTemAIch, tu asistente IA.</strong><br/>
              Pregúntame sobre temas de masculinidad, autodesarrollo, relaciones y psicología. Quiero ayudarte mi compa.
            </div>
          </div>
        </div>

        <div class="no-tokens-msg" id="no-tokens-msg">
          Sin tokens disponibles. <a href="/profile">Compra más desde tu perfil →</a>
        </div>

        <div class="typing-row" id="typing-row" style="display:none;">
          <div class="msg-avatar bot-avatar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="2" width="3" height="7" rx="1.5" fill="white"/>
              <rect x="7" y="1" width="3" height="8" rx="1.5" fill="white"/>
              <rect x="11" y="1.5" width="3" height="7.5" rx="1.5" fill="white"/>
              <rect x="15" y="3" width="3" height="6" rx="1.5" fill="white"/>
              <rect x="2" y="7.5" width="17" height="7" rx="2" fill="white"/>
              <rect x="0" y="9.5" width="4.5" height="3.5" rx="1.75" fill="white"/>
              <rect x="4" y="13" width="13" height="5" rx="1.5" fill="white"/>
              <path d="M3.5 17.5 C1.5 17.5 0.5 18.5 0.5 19.5 C0.5 20.5 1.5 21.5 3.5 21.5" stroke="#5DFFF1" stroke-width="1.3" fill="none" stroke-linecap="round"/>
              <path d="M17.5 17.5 C19.5 17.5 20.5 18.5 20.5 19.5 C20.5 20.5 19.5 21.5 17.5 21.5" stroke="#5DFFF1" stroke-width="1.3" fill="none" stroke-linecap="round"/>
              <line x1="4.5" y1="13.5" x2="2" y2="10" stroke="#5DFFF1" stroke-width="1" stroke-linecap="round"/>
              <line x1="16.5" y1="13.5" x2="19" y2="10" stroke="#5DFFF1" stroke-width="1" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>

        <div class="input-area">
          <div class="sources-bar" id="sources-bar" style="display:none;">
            <span class="sources-label">Videos relacionados:</span>
            <div id="sources-list"></div>
          </div>
          <div class="input-row">
            <textarea
              id="chat-input"
              class="chat-input"
              placeholder="Te escucho mi cumpa..."
              rows="1"
              onkeydown="handleKey(event)"
              oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Enviar — cuesta 1 token">
              <span class="send-token-cost" id="send-token-cost">⚡1</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22,2 15,22 11,13 2,9"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
