<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TemaichBot — Chatea con el canal</title>
  <meta name="description" content="Chatbot basado en todos los videos del canal ELTEMACH." />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:   #d4a017;
      --gold2:  #f5c842;
      --red:    #cc1a1a;
      --red2:   #ff3333;
      --dark:   #080808;
      --dark2:  #101010;
      --dark3:  #161616;
      --border: rgba(212,160,23,0.18);
      --glow:   0 0 22px rgba(212,160,23,0.45);
      --text:   #e8e0d0;
      --muted:  #7a7060;
      --header-h: 62px;
    }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      background: var(--dark);
      color: var(--text);
    }
    a { text-decoration: none; }

    /* ── BG ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(212,160,23,.06) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(212,160,23,.008) 3px, rgba(212,160,23,.008) 4px);
      pointer-events: none;
    }

    /* ── NAVBAR ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: rgba(8,8,8,.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
    }
    .header-inner {
      max-width: 900px; margin: 0 auto;
      padding: 0 1.5rem; height: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: .65rem; }
    .logo-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--red));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; box-shadow: var(--glow);
      animation: iconPulse 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%,100%{ box-shadow: 0 0 12px rgba(212,160,23,.4); }
      50%    { box-shadow: 0 0 24px rgba(204,26,26,.5); }
    }
    .logo-text { font-family: 'Bebas Neue'; font-size: 1.25rem; letter-spacing: 3px; color: #fff; }
    .logo-text em { color: var(--gold); font-style: normal; }

    .header-nav { display: flex; align-items: center; gap: .6rem; }

    .nav-link {
      color: var(--muted); font-family: 'Orbitron'; font-size: .6rem;
      letter-spacing: 2px; padding: .35rem .85rem;
      border: 1px solid transparent; border-radius: 6px;
      transition: all .2s;
    }
    .nav-link:hover { border-color: var(--border); color: var(--gold); }

    .nav-buy {
      padding: .38rem 1rem; border-radius: 7px;
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      color: #000; font-family: 'Bebas Neue'; font-size: .88rem; letter-spacing: 2px;
      border: none; cursor: pointer; box-shadow: 0 0 12px rgba(212,160,23,.35);
      transition: all .25s;
    }
    .nav-buy:hover { transform: translateY(-1px); box-shadow: var(--glow); }

    .token-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(212,160,23,.08);
      border: 1px solid rgba(212,160,23,.25);
      border-radius: 100px; padding: .28rem .8rem;
      font-family: 'Orbitron'; font-size: .65rem; color: var(--gold);
    }
    .token-badge .t-num { font-family: 'Bebas Neue'; font-size: 1.1rem; line-height: 1; color: var(--gold2); }
    .token-badge.low { border-color: rgba(204,26,26,.5); color: var(--red2); animation: pulseRed 1.5s infinite; }
    .token-badge.low .t-num { color: var(--red2); }
    @keyframes pulseRed { 0%,100%{ box-shadow: none; } 50%{ box-shadow: 0 0 8px rgba(204,26,26,.4); } }

    .status-pill {
      display: flex; align-items: center; gap: .4rem;
      border: 1px solid var(--border); border-radius: 100px;
      padding: .28rem .85rem;
      font-family: 'Orbitron'; font-size: .58rem; letter-spacing: 1px;
      color: var(--muted);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .3s; }
    .status-pill.ready .status-dot { background: #00e676; box-shadow: 0 0 6px #00e676; }
    .status-pill.ready { border-color: rgba(0,230,118,.3); color: #00e676; }
    .status-pill.error .status-dot { background: var(--red2); }
    .status-pill.error { border-color: rgba(204,26,26,.3); color: var(--red2); }

    /* ── LAYOUT ── */
    .main-layout {
      position: fixed;
      top: var(--header-h); left: 0; right: 0; bottom: 0;
      display: flex; justify-content: center;
      z-index: 1;
    }
    .layout-inner {
      display: flex; width: 100%; max-width: 1200px;
    }

    /* ── SIDEBAR FOTO ── */
    .bot-sidebar {
      width: 280px; flex-shrink: 0;
      position: relative; overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .bot-sidebar img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top center;
      display: block;
    }
    .bot-sidebar::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to right,
        transparent 60%,
        var(--dark) 100%
      ), linear-gradient(
        to top,
        var(--dark) 0%,
        transparent 30%
      );
      pointer-events: none;
    }
    .bot-sidebar-label {
      position: absolute; bottom: 1.5rem; left: 0; right: 0;
      text-align: center; z-index: 2;
      pointer-events: none;
    }
    .bot-sidebar-label span {
      font-family: 'Bebas Neue'; font-size: 1.1rem; letter-spacing: 3px;
      color: var(--gold); text-shadow: 0 0 12px rgba(212,160,23,.6);
    }
    .bot-sidebar-label small {
      display: block; font-family: 'Orbitron'; font-size: .55rem;
      letter-spacing: 2px; color: var(--muted); margin-top: 2px;
    }
    .bot-online {
      position: absolute; top: 1rem; left: 1rem; z-index: 2;
      display: flex; align-items: center; gap: .4rem;
      background: rgba(8,8,8,.7); border: 1px solid rgba(0,230,118,.3);
      border-radius: 100px; padding: .25rem .7rem;
      font-family: 'Orbitron'; font-size: .55rem; letter-spacing: 1px; color: #00e676;
    }
    .bot-online-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #00e676; box-shadow: 0 0 5px #00e676;
      animation: blink 1.6s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    @media(max-width:780px) { .bot-sidebar { display: none; } }

    .chat-section {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .chat-container { display: flex; flex-direction: column; height: 100%; }

    /* ── TOKEN BAR ── */
    .token-bar-wrap {
      padding: 6px 1.5rem 0;
      display: flex; align-items: center; gap: .6rem;
    }
    .token-bar-track {
      flex: 1; height: 2px;
      background: rgba(255,255,255,.06);
      border-radius: 2px; overflow: hidden;
    }
    .token-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold2), var(--gold));
      transition: width .5s ease, background .3s;
      border-radius: 2px;
    }
    .token-bar-fill.low { background: var(--red2); }
    .token-bar-count {
      font-family: 'Bebas Neue'; font-size: .95rem;
      color: var(--gold); min-width: 20px; text-align: right;
    }
    .token-bar-count.low { color: var(--red2); }
    .clear-chat-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 2px 4px;
      display: flex; align-items: center; transition: color .2s;
    }
    .clear-chat-btn:hover { color: var(--red2); }

    /* ── MESSAGES ── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 1.5rem 1.5rem 1rem;
      display: flex; flex-direction: column; gap: 1.1rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(212,160,23,.2) transparent;
    }
    .msg-row {
      display: flex; gap: .85rem;
      animation: fadeSlideUp .25s ease forwards;
    }
    @keyframes fadeSlideUp {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .msg-row.user  { flex-direction: row-reverse; align-self: flex-end; max-width: 75%; }
    .msg-row.bot   { align-self: flex-start; max-width: 85%; }

    .msg-avatar {
      width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: .85rem;
      overflow: hidden;
    }
    .bot-avatar {
      border: 1px solid rgba(212,160,23,.35);
      box-shadow: 0 0 12px rgba(212,160,23,.25);
      background: #000;
    }
    .bot-avatar img {
      width: 100%; height: 100%; object-fit: cover; object-position: top center;
    }
    .user-avatar { background: rgba(255,255,255,.06); border: 1px solid var(--border); color: var(--muted); }

    .msg-content { display: flex; flex-direction: column; gap: 3px; }
    .msg-bubble {
      padding: .75rem 1rem;
      font-size: .95rem; line-height: 1.7;
      border-radius: 12px;
    }
    .bot-bubble {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-left: 2px solid var(--gold);
      color: var(--text);
    }
    .user-bubble {
      background: linear-gradient(135deg, rgba(212,160,23,.15), rgba(204,26,26,.1));
      border: 1px solid rgba(212,160,23,.25);
      color: var(--text);
    }
    .msg-bubble p { margin: 0 0 6px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble strong { color: var(--gold2); font-weight: 700; }
    .msg-time {
      font-size: .7rem; color: var(--muted); padding: 0 4px;
      align-self: flex-end;
    }
    .msg-row.user .msg-time { text-align: right; }

    /* ── TYPING ── */
    .typing-row {
      display: flex; align-items: center; gap: .85rem;
      padding: 0 1.5rem .5rem;
      animation: fadeSlideUp .2s ease forwards;
    }
    .typing-dots {
      display: flex; gap: 4px; padding: .65rem .85rem;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border); border-left: 2px solid var(--gold);
      border-radius: 12px;
    }
    .typing-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold); animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; background: var(--red2); }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: .4; }
      40%         { transform: translateY(-5px); opacity: 1; }
    }

    /* ── NO TOKENS ── */
    .no-tokens-msg {
      background: rgba(204,26,26,.08); border: 1px solid rgba(204,26,26,.3);
      color: var(--red2); padding: .6rem 1rem; font-size: .85rem; font-weight: 600;
      margin: 0 1.5rem .5rem; border-radius: 8px; display: none;
      animation: fadeSlideUp .2s ease;
    }
    .no-tokens-msg a { color: var(--gold); font-weight: 700; }

    /* ── SOURCES ── */
    .sources-bar {
      display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
      padding: .5rem 1.5rem; border-bottom: 1px solid var(--border);
      animation: fadeSlideUp .2s ease;
    }
    .sources-label {
      font-family: 'Orbitron'; font-size: .58rem;
      letter-spacing: 2px; color: var(--gold); white-space: nowrap;
    }
    #sources-list { display: flex; gap: .5rem; flex-wrap: wrap; }
    .source-chip {
      background: transparent; border: 1px solid var(--border);
      border-radius: 100px; color: var(--muted);
      font-family: 'Rajdhani'; font-size: .78rem; font-weight: 600;
      padding: .2rem .7rem; transition: all .15s; display: inline-block;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .source-chip:hover { background: rgba(212,160,23,.1); border-color: var(--gold); color: var(--gold); }

    /* ── INPUT ── */
    .input-area {
      padding: .6rem 1.5rem 1rem;
      border-top: 1px solid var(--border);
      background: rgba(8,8,8,.9);
      backdrop-filter: blur(12px);
    }
    .input-row {
      display: flex; gap: .6rem; align-items: flex-end;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .6rem .6rem .6rem 1rem;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: rgba(212,160,23,.4); box-shadow: 0 0 0 2px rgba(212,160,23,.08); }
    .chat-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'Rajdhani'; font-size: .98rem;
      resize: none; line-height: 1.5; max-height: 140px; overflow-y: auto;
    }
    .chat-input::placeholder { color: rgba(122,112,96,.5); }

    .send-btn {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      border: none; color: #000; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
      box-shadow: 0 0 12px rgba(212,160,23,.3);
      transition: all .2s;
    }
    .send-btn:hover { transform: scale(1.07); box-shadow: var(--glow); }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .send-token-cost { font-family: 'Orbitron'; font-size: .5rem; font-weight: 700; letter-spacing: .5px; line-height: 1; }

    /* ── TOAST ── */
    #toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      display: flex; flex-direction: column; gap: .5rem;
      z-index: 9999; pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: .6rem;
      background: var(--dark2); border: 1px solid var(--border);
      border-left: 3px solid var(--gold); border-radius: 10px;
      padding: .75rem 1rem;
      font-size: .85rem; font-weight: 600; color: var(--text);
      max-width: 300px; pointer-events: auto;
      animation: toastIn .3s ease forwards;
    }
    .toast.error   { border-left-color: var(--red2); }
    .toast.success { border-left-color: #00e676; }
    .toast.warning { border-left-color: var(--gold2); }
    .toast.hiding  { animation: toastOut .3s ease forwards; }
    @keyframes toastIn  { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
    @keyframes toastOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(16px)} }

    .error-bubble { background: rgba(204,26,26,.08); border-color: rgba(204,26,26,.3); color: #ff7070; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212,160,23,.2); border-radius: 2px; }

    @media(max-width:600px) {
      .messages { padding: .9rem .9rem .6rem; }
      .input-area { padding: .5rem .9rem .8rem; }
      .token-bar-wrap { padding: 6px .9rem 0; }
      .typing-row, .no-tokens-msg, .sources-bar { padding-left: .9rem; padding-right: .9rem; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">TEMAICH<em>BOT</em></div>
    </a>
    <nav class="header-nav">
      <div class="token-badge" id="token-badge" style="display:none;">
        ⚡ <span class="t-num" id="token-count">0</span>
      </div>
      <a href="/profile#comprar" class="nav-buy" id="buy-link" style="display:none;">⚡ Comprar tokens</a>
      <a href="/profile" class="nav-link" id="profile-link" style="display:none;"></a>
      <a href="/login"   class="nav-link" id="login-link"   style="display:none;">Entrar</a>
      <div class="status-pill" id="status-pill">
        <span class="status-dot"></span>
        <span id="status-text">Cargando...</span>
      </div>
    </nav>
  </div>
</header>

<!-- MAIN -->
<main class="main-layout">
<div class="layout-inner">

  <!-- Foto lateral -->
  <div class="bot-sidebar">
    <img src="/img/temach-avatar.png" alt="El Temach"/>
    <div class="bot-online">
      <span class="bot-online-dot"></span>
      EN LÍNEA
    </div>
    <div class="bot-sidebar-label">
      <span>EL TEMACH</span>
      <small>ASISTENTE IA</small>
    </div>
  </div>

  <section class="chat-section">
    <div class="chat-container">

      <!-- Token bar -->
      <div class="token-bar-wrap" id="token-bar-wrap" style="display:none;">
        <div class="token-bar-track">
          <div class="token-bar-fill" id="token-bar-fill"></div>
        </div>
        <span class="token-bar-count" id="token-bar-count">0</span>
        <button class="clear-chat-btn" onclick="clearHistory()" title="Limpiar conversación">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages">
        <div class="msg-row bot">
          <div class="msg-avatar bot-avatar"><img src="/img/temach-avatar.png" alt="Temach"/></div>
          <div class="msg-content">
            <div class="msg-bubble bot-bubble">
              <strong>Soy TemaichBot, tu asistente IA.</strong><br/>
              Pregúntame sobre temas de masculinidad, autodesarrollo, relaciones y psicología. Quiero ayudarte mi compa.
            </div>
          </div>
        </div>
      </div>

      <!-- No tokens -->
      <div class="no-tokens-msg" id="no-tokens-msg">
        Sin tokens disponibles. <a href="/profile">Compra más desde tu perfil →</a>
      </div>

      <!-- Typing -->
      <div class="typing-row" id="typing-row" style="display:none;">
        <div class="msg-avatar bot-avatar">⚡</div>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-row">
          <textarea
            id="chat-input"
            class="chat-input"
            placeholder="Te escucho mi cumpa..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Enviar — cuesta 1 token">
            <span class="send-token-cost" id="send-token-cost">⚡1</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22,2 15,22 11,13 2,9"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </section>
</div>
</main>

<div id="toast-container"></div>

<script src="/js/app.js"></script>
</body>
</html>
