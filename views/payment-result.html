<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resultado de pago — ElTemAIch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="/css/auth.css"/>
  <style>
    .result-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .result-box { width: 100%; max-width: 440px; text-align: center; }
    .result-icon { font-size: 56px; margin-bottom: 16px; line-height: 1; }
    .result-title { font-family: var(--font-d); font-size: 28px; letter-spacing: 2px; margin-bottom: 8px; }
    .result-msg { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 28px; }
    .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="result-wrap">
  <div class="result-box">
    <div class="result-icon" id="result-icon">⏳</div>
    <div class="result-title" id="result-title">Procesando...</div>
    <div class="result-msg" id="result-msg">Verificando tu pago.</div>
    <div class="result-actions">
      <a href="/profile" class="btn btn-primary">Ver mi perfil</a>
      <a href="/" class="btn btn-secondary">Ir al chat</a>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const status = params.get('collection_status') || params.get('status');
  const path = window.location.pathname;

  const icon  = document.getElementById('result-icon');
  const title = document.getElementById('result-title');
  const msg   = document.getElementById('result-msg');

  if (path.includes('success') || status === 'approved') {
    icon.textContent  = '✅';
    title.textContent = '¡Pago exitoso!';
    title.style.color = 'var(--cyan)';
    msg.textContent   = 'Tu pago fue aprobado. Los tokens serán acreditados en tu cuenta en unos segundos.';
  } else if (path.includes('failure') || status === 'rejected') {
    icon.textContent  = '❌';
    title.textContent = 'Pago rechazado';
    title.style.color = 'var(--red)';
    msg.textContent   = 'No se pudo procesar tu pago. Puedes intentarlo de nuevo desde tu perfil.';
  } else if (path.includes('pending') || status === 'pending') {
    icon.textContent  = '⏳';
    title.textContent = 'Pago pendiente';
    title.style.color = '#f0a000';
    msg.textContent   = 'Tu pago está siendo procesado. Te notificaremos cuando sea confirmado y los tokens sean acreditados.';
  }
</script>
</body>
</html>
