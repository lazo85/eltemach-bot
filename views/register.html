<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro — TemaichBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:   #d4a017;
      --gold2:  #f5c842;
      --red:    #cc1a1a;
      --red2:   #ff3333;
      --dark:   #080808;
      --dark2:  #101010;
      --border: rgba(212,160,23,0.2);
      --glow:   0 0 22px rgba(212,160,23,0.45);
      --text:   #e8e0d0;
      --muted:  #7a7060;
    }
    html, body {
      min-height: 100vh;
      font-family: 'Rajdhani', sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
    }
    h1,h2,h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
    a { text-decoration: none; }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(212,160,23,.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .auth-wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 1.2rem;
    }

    .auth-box {
      width: 100%; max-width: 420px;
    }

    .auth-logo {
      display: flex; flex-direction: column;
      align-items: center; gap: .6rem;
      margin-bottom: 2rem;
    }
    .auth-logo-icon {
      width: 60px; height: 60px; border-radius: 16px;
      background: linear-gradient(135deg, var(--gold), var(--red));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; box-shadow: var(--glow);
    }
    .auth-logo-name {
      font-family: 'Bebas Neue'; font-size: 1.5rem;
      letter-spacing: 4px; color: #fff;
    }
    .auth-logo-name em { color: var(--gold); font-style: normal; }

    .auth-title {
      font-size: 2rem; color: #fff; text-align: center;
      margin-bottom: .3rem;
    }
    .auth-sub {
      text-align: center; color: var(--muted);
      font-size: .9rem; letter-spacing: 1px;
      margin-bottom: 1.4rem;
    }

    /* BONUS BANNER */
    .bonus-banner {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      background: rgba(212,160,23,.07);
      border: 1px solid rgba(212,160,23,.3);
      border-radius: 10px;
      padding: .65rem 1rem;
      font-size: .88rem; font-weight: 600;
      color: var(--gold2);
      margin-bottom: 1.2rem;
      letter-spacing: .5px;
    }

    .auth-divider {
      display: flex; align-items: center; gap: .8rem;
      margin-bottom: 1.2rem;
    }
    .auth-divider-line { flex: 1; height: 1px; background: var(--border); }
    .auth-divider-text {
      font-family: 'Orbitron'; font-size: .58rem;
      letter-spacing: 2px; color: var(--muted);
    }

    .auth-card {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
      margin-bottom: 1.2rem;
    }

    .form-group { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
    .form-label {
      font-family: 'Orbitron'; font-size: .62rem;
      letter-spacing: 2px; color: var(--muted);
    }
    .form-input-wrap { position: relative; }
    .form-input {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(212,160,23,.2);
      border-radius: 10px; padding: .75rem 1rem;
      color: var(--text); font-family: 'Rajdhani'; font-size: 1rem;
      outline: none; transition: border-color .3s, box-shadow .3s;
      width: 100%;
    }
    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,160,23,.1);
    }
    .form-input::placeholder { color: #3a3530; }
    .form-input.with-icon { padding-right: 2.5rem; }

    .input-status {
      position: absolute; right: .8rem; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      display: none;
    }
    .input-msg {
      font-size: .75rem; font-weight: 600;
      margin-top: .2rem; display: none;
    }
    .input-msg.ok  { color: #44dd88; }
    .input-msg.err { color: var(--red2); }

    .btn-gold {
      width: 100%; padding: .85rem;
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      color: #000; font-family: 'Bebas Neue'; font-size: 1.1rem;
      letter-spacing: 2px; border: none; border-radius: 10px;
      cursor: pointer; box-shadow: var(--glow);
      transition: all .3s; margin-top: .3rem;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(212,160,23,.6); }
    .btn-gold:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    #google-btn-wrap {
      display: flex; justify-content: center;
      margin-bottom: 1.2rem;
    }

    .alert { display: none; border-radius: 10px; padding: .7rem 1rem; font-size: .85rem; margin-bottom: 1rem; }
    .alert.show { display: block; }
    .alert-error { background: rgba(204,26,26,.08); border: 1px solid rgba(204,26,26,.3); color: var(--red2); }

    .auth-footer {
      text-align: center; font-size: .88rem;
      color: var(--muted);
    }
    .auth-footer a { color: var(--gold); font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(var(--gold), var(--red)); border-radius: 3px; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <div class="auth-logo-name">TEMAICH<em>BOT</em></div>
    </div>

    <h1 class="auth-title">Crear cuenta</h1>
    <p class="auth-sub">Únete a ElTemAIch</p>

    <div class="bonus-banner">
      ⚡ Recibes <strong style="margin:0 4px;">3 tokens gratis</strong> al registrarte
    </div>

    <div id="google-btn-wrap">
      <div id="google-signin-btn"></div>
    </div>

    <div class="auth-divider">
      <div class="auth-divider-line"></div>
      <span class="auth-divider-text">o con email</span>
      <div class="auth-divider-line"></div>
    </div>

    <div class="auth-card">
      <div class="alert alert-error" id="alert"></div>
      <form id="reg-form">
        <div class="form-group">
          <label class="form-label">Nombre de usuario</label>
          <input class="form-input" type="text" id="username" placeholder="tu_nombre" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="form-input-wrap">
            <input class="form-input with-icon" type="email" id="email" placeholder="tu@email.com" required/>
            <span class="input-status" id="email-status"></span>
          </div>
          <span class="input-msg" id="email-msg"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" type="password" id="password" placeholder="Mínimo 6 caracteres" required/>
        </div>
        <button class="btn-gold" type="submit" id="submit-btn">⚡ Crear cuenta</button>
      </form>
    </div>

    <div class="auth-footer">
      ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
    </div>

  </div>
</div>

<script src="/js/google-auth.js"></script>
<script>
  if (localStorage.getItem('temach_token')) window.location.href = '/';

  initGoogleAuth();

  let emailValid = true;
  let checkTimeout;

  const emailInput  = document.getElementById('email');
  const emailStatus = document.getElementById('email-status');
  const emailMsg    = document.getElementById('email-msg');

  emailInput.addEventListener('input', () => {
    clearTimeout(checkTimeout);
    emailStatus.style.display = 'none';
    emailMsg.style.display = 'none';
    emailValid = true;
    emailInput.style.borderColor = '';

    const val = emailInput.value.trim();
    if (!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) return;

    checkTimeout = setTimeout(async () => {
      emailStatus.textContent = '⏳';
      emailStatus.style.display = 'inline';
      try {
        const res = await fetch(`/api/auth/check-email?email=${encodeURIComponent(val)}`);
        const { available } = await res.json();
        if (available) {
          emailStatus.textContent = '✅';
          emailMsg.textContent = 'Email disponible';
          emailMsg.className = 'input-msg ok';
          emailMsg.style.display = 'block';
          emailInput.style.borderColor = '#44dd88';
          emailValid = true;
        } else {
          emailStatus.textContent = '❌';
          emailMsg.textContent = 'Este email ya está registrado';
          emailMsg.className = 'input-msg err';
          emailMsg.style.display = 'block';
          emailInput.style.borderColor = 'rgba(255,5,9,0.6)';
          emailValid = false;
        }
      } catch (_) {
        emailStatus.style.display = 'none';
      }
    }, 500);
  });

  document.getElementById('reg-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!emailValid) return;
    const btn = document.getElementById('submit-btn');
    const alertEl = document.getElementById('alert');
    alertEl.className = 'alert'; alertEl.textContent = '';
    btn.disabled = true; btn.textContent = 'Creando cuenta...';

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('temach_token', data.token);
      localStorage.setItem('temach_user', JSON.stringify(data.user));
      window.location.href = '/';
    } catch (err) {
      alertEl.textContent = err.message;
      alertEl.className = 'alert alert-error show';
      btn.disabled = false; btn.textContent = '⚡ Crear cuenta';
    }
  });
</script>
</body>
</html>
